name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - run: npx tsc --noEmit

      - run: npm run lint

      - run: npm run format:check

      - run: npm test -- --coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm install
        working-directory: web

      - run: npm test
        working-directory: web

      - run: npm run build
        working-directory: web

      # Bundle size guard — current baseline ~291 KB, threshold 500 KB (512000 bytes).
      # To update: run `du -sb web/dist/assets/` after a local build and raise the threshold.
      - name: Check frontend bundle size
        run: |
          THRESHOLD=512000
          SIZE=$(du -sb web/dist/assets/ | awk '{print $1}')
          echo "Bundle size: ${SIZE} bytes (threshold: ${THRESHOLD} bytes)"
          if [ "$SIZE" -gt "$THRESHOLD" ]; then
            echo "ERROR: Bundle size ${SIZE} bytes exceeds threshold ${THRESHOLD} bytes"
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - run: npx playwright install chromium --with-deps

      - run: npm install
        working-directory: web

      - run: npm run test:e2e
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
